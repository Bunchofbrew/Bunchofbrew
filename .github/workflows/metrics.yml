name: Metrics

on:
  # Run every hour
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:       # allow manual runs
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ADITYA_TOKEN }}
          user: Bunchofbrew
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_display: columns
          config_timezone: Asia/Kolkata

          # Activity
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_limit: 5
          plugin_activity_timestamps: yes

          # AniList
          plugin_anilist: yes
          plugin_anilist_user: your_anilist_username

          # Calendar
          plugin_calendar: yes
          plugin_calendar_limit: 5

          # Code
          plugin_code: yes
          plugin_code_days: 3
          plugin_code_lines: 12

          # Discussions
          plugin_discussions: yes
          plugin_discussions_categories: yes

          # Followup
          plugin_followup: yes
          plugin_followup_sections: repositories

          # Gists
          plugin_gists: yes

          # Habits
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_charts: yes

          # Introduction
          plugin_introduction: yes

          # Isocalendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Languages
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 18

          # Lines
          plugin_lines: yes

          # Music (Spotify)
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_token: ${{ secrets.SPOTIFY_TOKEN }}
          plugin_music_user: your_spotify_username
          plugin_music_mode: recent
          plugin_music_limit: 4

          # Notable repos
          plugin_notable: yes
          plugin_notable_repositories: yes

          # PageSpeed
          plugin_pagespeed: yes
          plugin_pagespeed_url: bunchofbrew.github.io

          # People
          plugin_people: yes
          plugin_people_types: followers, following

          # Projects
          plugin_projects: yes
          plugin_projects_limit: 7

          # RSS
          plugin_rss: yes
          plugin_rss_limit: 4

          # Sponsors
          plugin_sponsors: yes
          plugin_sponsors_sections: goal, list, about

          # StackOverflow
          plugin_stackoverflow: yes
          plugin_stackoverflow_user: your_stackoverflow_id

          # Stargazers
          plugin_stargazers: yes
          plugin_stargazers_days: 14

          # Stars
          plugin_stars: yes
          plugin_stars_limit: 10

          # Topics
          plugin_topics: yes
          plugin_topics_limit: 15

          # Traffic
          plugin_traffic: yes

          # Tweets
          plugin_tweets: yes
          plugin_tweets_user: your_twitter_handle

          # Wakatime
          plugin_wakatime: yes
          plugin_wakatime_user: current
